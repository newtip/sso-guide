    const ANSWERS = {
      '查看 12 问清单': `### 📋 SSO 设计必答问题 12 问

      '常见风险提示': `### ⚠️ SSO 项目常见风险

**1. 第三方配合度低**

      '需求文档模板': `### 📄 SSO 需求调研表（模板）

复制这个模板发给客户填写！`,

      '场景识别指南': `### 🎯 对接场景识别

**场景 A：双 smardaten 平台**
- 特征：对接双方都是 smardaten 系统

请告诉我你属于哪种场景？`,

      '配置实现方案': `### ⚙️ 配置实现方案（推荐优先）

**SSO 标准配置路径：**
系统配置 → 安全配置 → SSO 配置

**配置项说明：**

| 配置项 | 配置值 | 说明 |
|--------|--------|------|
| SSO 类型 | common/OAuth 2.0 | 根据第三方协议选择 |
| 是否启用 SSO | 是 | sys_property=1 |
| Token 获取方式 | URL 参数/服务编排 | 简单场景用 URL，复杂用服务编排 |
| 用户匹配字段 | 工号/账号/邮箱 | 根据第三方提供的字段 |
| 登录策略 | 匹配/创建 | 匹配不上拒绝还是创建新用户 |
| 登出策略 | 全局/局部 | 是否同步登出其他系统 |

需要我帮你设计具体的服务编排流程吗？`,

      '二开方案评估': `### 💻 二开方案评估

**何时需要二开？**

| 情况 | 说明 | 工作量 |

| 协议不支持 | 第三方使用 SAML/私有协议 | 3-5 人天 |
| Token 获取复杂 | 需要多步调用、复杂签名 | 2-3 人天 |
| 用户匹配复杂 | 需要跨系统查询、复杂逻辑 | 2-3 人天 |

**二开位置：**

1. **前端二开** - postMessage 监听、自定义跳转
2. **后端二开** - 自定义 REST 服务
3. **服务编排扩展** - 自定义逻辑、加密解密

**建议：优先尝试服务编排，最后考虑代码二开！**`,

      '服务编排配置': `### 🔧 服务编排配置示例

      '联调检查清单': `### ✅ 联调检查清单

**配置检查：**

      '跳转到登录页': `### 问题：跳转到登录页

**按以下步骤排查：**

**第 1 步：F12 查看网络请求**
1. 按 F12 打开浏览器控制台
2. 切换到 Network 标签，勾选 Preserve log
3. 重新尝试单点登录

**第 2 步：检查关键接口**
看是否请求了以下接口：
- \`/querySSOConfig\` - SSO 配置查询
- \`/login\` - 登录接口
- \`/user\` - 用户信息接口

**常见原因：**
1. 跨域问题（域名或端口不一致）
2. SSO 配置未开启（sys_property=0）
3. 链接中未拼接 Token
4. license 版本为 EOB（不支持 SSO）`,

      '数据库没有用户': `### 问题：数据库没有当前用户

**解决方法：**

**第 1 步：检查用户映射表**
\`\`\`sql
SELECT * FROM t_sdata_user_mapping 
WHERE third_party_id = '第三方用户 ID';
\`\`\`

**第 2 步：清理脏数据**
\`\`\`sql
DELETE FROM t_sdata_user_mapping 
WHERE third_party_id = '第三方用户 ID';
\`\`\`

**第 3 步：重新尝试单点登录**
清理后重新登录，系统会重新创建用户。`,

      'Token 验证失败': `### 问题：Token 校验失败/连接超时

**按以下步骤排查：**

**第 1 步：查看日志**
\`\`\`bash
tail -f /tomcat/logs/sdata/sdata-run.log | grep "===/sso/login"
\`\`\`

**第 2 步：网络连通性测试**
\`\`\`bash
telnet third-party.com 443
\`\`\`

**常见问题：**
- 连接超时 → 联系运维打通网络
- 401/403 → Token 无效
- 500 → 接口报错
- SSL 错误 → 检查 HTTPS 证书`,

**如果显示 EOB：** 联系 PM 更换 license，升级到 EOD 及以上版本。`,

      '跨域问题': `### 问题：跨域问题（iframe 无法正常免登）

**问题表现：**
- iframe 加载后仍然显示登录页

**解决方案：**

**方案 1：配置同源（推荐）**

- 域名保持一致（如都用 company.com）
- 端口保持一致（如都用 443）

**方案 2：使用 postMessage（需二开）**
如果无法配置同源，使用 postMessage 跨域通信。

**最佳实践：优先方案 1，配置同源最稳定！**`
    };
    
    function selectRole(role) {
      currentRole = role;
      
      const roleData = {
        pm: {
          name: 'PM',
          quickActions: ['查看 12 问清单', '需求质量检查', '常见风险提示', '需求文档模板']
        },
        ae: {
          name: 'AE',
          quickActions: ['场景识别指南', '配置实现方案', '二开方案评估', '服务编排配置', '联调检查清单']
        },
        debug: {
          name: '问题排查',
          quickActions: ['跳转到登录页', '数据库没有用户', 'Token 验证失败', '版本不支持', '跨域问题']
        }
      };
      
      const data = roleData[role];
      
      document.querySelectorAll('.role-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.role === role);
      });
      
      document.getElementById('modeBadge').textContent = `${data.name} 模式`;
      
      const quickActions = document.getElementById('quickActions');
      quickActions.style.display = 'flex';
      quickActions.innerHTML = data.quickActions.map(action => 
        `<button class="quick-action-btn" onclick="sendQuickAction('${action}')">${action}</button>`
      ).join('');
      
      addMessage(`你好！我是 SSO 项目指导 Agent 🎯\n\n我是${data.name === 'PM' ? '👔 PM' : data.name === 'AE' ? '💻 AE' : '🔍 问题排查'}助手。\n\n请点击下方的快捷按钮，我会提供完整的指导方案！`, 'bot');
    }
    
    function addMessage(content, type) {
      const messagesDiv = document.getElementById('chatMessages');
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${type}`;
      
      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content markdown-body';
      contentDiv.innerHTML = simpleMarkdown(content);
      
      messageDiv.appendChild(contentDiv);
      messagesDiv.appendChild(messageDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    function simpleMarkdown(text) {
      if (!text) return '';
      
      let html = text
        .replace(/^### (.*$)/gim, '<h3>$1</h3>')
        .replace(/^## (.*$)/gim, '<h2>$1</h2>')
        .replace(/^# (.*$)/gim, '<h1>$1</h1>')
        .replace(/\*\*(.*?)\*\*/gim, '<strong>$1</strong>')
        .replace(/^- (.*$)/gim, '<li>$1</li>')
        .replace(/^\d+\. (.*$)/gim, '<li>$1</li>')
        .replace(/\n/g, '<br>')
        .replace(/\\\`/g, '`');
      
      // 表格处理
      html = html.replace(/\\n\|(.*)\|/g, (match) => {
        const cells = match.split('|').filter(c => c.trim());
        if (cells.length > 0) {
          return '<br><table><tr>' + cells.map(c => `<td>${c.trim()}</td>`).join('') + '</tr></table>';
        }
        return match;
      });
      
      // 代码块处理
      html = html.replace(/\\n\\\`\\\`\\\`([\\s\\S]*?)\\\`\\\`\\\`/g, '<br><pre><code>$1</code></pre>');
      
      return html;
    }
    
    function sendMessage() {
      const input = document.getElementById('userInput');
      const message = input.value.trim();
      if (!message) return;
      
      if (!currentRole) {
        addMessage('请先选择角色（PM / AE / 问题排查）', 'bot');
        return;
      }
      
      addMessage(message, 'user');
      input.value = '';
      
      // 查找匹配的答案
      let answer = null;
      for (const [key, value] of Object.entries(ANSWERS)) {
        if (message.includes(key) || key.includes(message)) {
          answer = value;
          break;
        }
      }
      
      if (answer) {
        setTimeout(() => addMessage(answer, 'bot'), 300);
      } else {
        setTimeout(() => addMessage(`收到您的问题：**${message}**\n\n建议点击上方的快捷按钮获取完整答案，或尝试以下相关问题：\n\n` + Object.keys(ANSWERS).slice(0, 5).map(k => `- ${k}`).join('\\n'), 'bot'), 300);
      }
    }
    
    function sendQuickAction(action) {
      const answer = ANSWERS[action];
      if (answer) {
        addMessage(action, 'user');
        setTimeout(() => addMessage(answer, 'bot'), 300);
      }
    }
    
    // 初始化 - 确保 DOM 加载完成后绑定事件
    function init() {
      console.log('SSO Guide initialized');
      document.querySelectorAll('.role-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          console.log('Role selected:', this.dataset.role);
          selectRole(this.dataset.role);
        });
      });
    }
    
    // 页面加载完成后初始化
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
